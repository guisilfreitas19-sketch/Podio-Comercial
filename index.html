<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podio Soitic v14.0 Premium TV</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #111116, #010103);
            color: #f1f1f4; 
            overflow: hidden; 
            min-height: 100vh;
        }

        .italic-force { font-style: italic !important; }

        /* Estilo Vidro Flutuante */
        .glass-card { 
            background: rgba(18, 18, 23, 0.7); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            border-radius: 4rem;
        }

        /* Efeitos Neon e Glow */
        .neon-text-gold { color: #facc15; text-shadow: 0 0 30px rgba(250, 204, 21, 0.6); }
        .neon-text-emerald { color: #10b981; text-shadow: 0 0 30px rgba(16, 185, 129, 0.6); }
        .neon-text-blue { color: #3b82f6; text-shadow: 0 0 30px rgba(59, 130, 246, 0.6); }

        .bar-transition { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .management-input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); color: #fff; border-radius: 16px; padding: 16px; text-align: right; width: 100%; font-family: monospace; font-weight: bold; font-size: 1.1rem;}
        .management-input:focus { border-color: #facc15; outline: none; }

        /* Animações Monitor */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .podium-giant-text { font-size: 6rem; line-height: 1; animation: fadeIn 0.5s ease-out; }
    </
