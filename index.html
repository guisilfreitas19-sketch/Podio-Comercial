<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Comercial - Grupo Soitic</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,800;1,900&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: #f8fafc; 
            min-height: 100vh; 
            margin: 0; 
            padding-bottom: 40px; 
        }
        
        .glass-card { 
            background: #ffffff; 
            color: #1e293b; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); 
        }
        
        .input-field { 
            background: #f8fafc; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            padding: 10px; 
            text-align: right; 
            width: 100%; 
            font-weight: 800; 
            color: #1e293b; 
            transition: all 0.2s; 
        }
        
        .input-field:focus { 
            border-color: #6366f1; 
            outline: none; 
            background: #fff; 
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); 
        }
        
        .status-card { 
            transition: all 0.3s ease; 
            border: 1px solid #f1f5f9; 
        }
        
        .bar-transition { 
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .italic-force { 
            font-style: italic !important; 
        }
    </style>
</head>
<body class="p-4 italic-force">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center bg-white/5 p-6 rounded-[2.5rem] border border-white/10 backdrop-blur-sm">
            <div>
                <h1 class="text-2xl font-[900] text-white tracking-tighter uppercase italic-force">Grupo <span class="text-amber-500">Soitic</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em]">Podio Comercial - Sincronizado 2026</p>
            </div>
            <div id="sync-status" class="text-[9px] font-black px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-500 border border-emerald-500/20 tracking-widest uppercase">Nuvem Conectada</div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-6 lg:p-10">
            <h2 class="text-2xl font-[900] text-slate-800 mb-8 tracking-tighter uppercase italic-force border-b border-slate-100 pb-4">Ranking de Performance</h2>
            <div id="sellers-list" class="space-y-5">
                </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            
            <div class="glass-card rounded-[2.5rem] p-6 lg:p-8 border-b-[12px] border-emerald-500">
                <h2 class="text-3xl font-[900] text-emerald-600 mb-6 tracking-tighter text-center uppercase italic-force">Ecos</h2>
                <div class="space-y-5">
                    <div class="bg-emerald-50/50 p-5 rounded-[2rem] border-2 border-emerald-100 text-center">
                        <label class="text-[10px] font-black text-emerald-400 uppercase tracking-widest block mb-1">Faturamento Atual</label>
                        <input type="text" id="ecos-atual" oninput="mascaraFin(this, 'ecos', 'atual')" class="w-full bg-transparent text-4xl font-[900] text-emerald-700 outline-none text-center" placeholder="R$ 0,00">
                    </div>
                    <div class="grid grid-cols-3 gap-2" id="ecos-refs"></div>
                    <div id="res-ecos" class="space-y-3 pt-2"></div>
                </div>
            </div>

            <div class="glass-card rounded-[2.5rem] p-6 lg:p-8 border-b-[12px] border-indigo-500">
                <h2 class="text-3xl font-[900] text-indigo-600 mb-6 tracking-tighter text-center uppercase italic-force">Medsystem</h2>
                <div class="space-y-5">
                    <div class="bg-indigo-50/50 p-5 rounded-[2rem] border-2 border-indigo-100 text-center">
                        <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest block mb-1 italic-force">Soma (Guilherme + Luiz)</label>
                        <div id="med-atual-display" class="text-4xl font-[900] text-indigo-700 py-1">R$ 0,00</div>
                    </div>
                    <div class="grid grid-cols-3 gap-2" id="med-refs"></div>
                    <div id="res-med" class="space-y-3 pt-2"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDXIjm1BOM-8dO85elFdl-CL9y80e-UaSQ",
            authDomain: "podio-comercia.firebaseapp.com",
            projectId: "podio-comercia",
            storageBucket: "podio-comercia.firebasestorage.app",
            messagingSenderId: "973336659250",
            appId: "1:973336659250:web:5f16eb4015289837a9c32b"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Estado Inicial dos Dados
        let state = {
            sellers: [
                { id: 1, name: 'Guilherme', sales: 0, target: 6000 },
                { id: 2, name: 'Vanessa', sales: 0, target: 6000 },
                { id: 3, name: 'Luiz', sales: 0, target: 3000 },
                { id: 4, name: 'João', sales: 0, target: 3000 }
            ],
            fin: {
                ecos: { atual: 0, ref2025: 0, pior2026: 0, melhor2026: 0 },
                med: { ref2025: 0, pior2026: 0, melhor2026: 0 }
            }
        };

        // Formatação de Moeda
        function formatar(v) { 
            return (v || 0).toLocaleString('pt-br', { style: 'currency', currency: 'BRL' }); 
        }

        // --- SINCRONIZAÇÃO EM TEMPO REAL ---
        
        // Receber dados da Nuvem
        db.ref('dashboard_soitic_v1').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                state = data;
                render();
            }
        });

        // Enviar dados para a Nuvem
        function saveData() {
            db.ref('dashboard_soitic_v1').set(state);
        }

        // --- FUNÇÕES DE INTERAÇÃO ---

        function mascaraVendedor(i, id) {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2);
            const numValue = parseFloat(v);
            const seller = state.sellers.find(s => s.id === id);
            
            // Ativar confete se bater a meta
            if (numValue >= seller.target && seller.sales < seller.target) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
            
            seller.sales = numValue;
            saveData();
        }

        function mascaraFin(i, emp, campo) {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2);
            state.fin[emp][campo] = parseFloat(v);
            saveData();
        }

        function criarCardStatus(titulo, base, atual, icone) {
            if (!base || base === 0) return '';
            const diff = atual - base;
            const isPos = diff >= 0;
            const corTxt = isPos ? 'text-green-500' : 'text-rose-500';
            
            return `
                <div class="status-card p-4 rounded-[1.5rem] bg-white border-l-4 ${isPos ? 'border-green-400' : 'border-rose-400'} shadow-sm">
                    <div class="flex justify-between items-center mb-1">
                        <div class="flex items-center gap-2">
                            <span class="text-lg">${icone}</span>
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter italic-force">${titulo}</span>
                        </div>
                        <span class="text-[10px] font-black ${corTxt} bg-slate-50 px-2 rounded-full border border-slate-100">${((atual/base)*100).toFixed(1)}%</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <p class="text-[9px] font-bold text-slate-400 leading-none">Base: ${formatar(base)}</p>
                        <p class="text-xl font-[900] ${corTxt} leading-none tracking-tighter italic-force">
                            ${isPos ? '▲' : '▼'} ${formatar(Math.abs(diff))}
                        </p>
                    </div>
                </div>`;
        }

        function render() {
            const gui = state.sellers.find(s => s.name === 'Guilherme').sales;
            const lui = state.sellers.find(s => s.name === 'Luiz').sales;
            const somaMed = gui + lui;
            
            // Atualiza Display Medsystem
            document.getElementById('med-atual-display').innerText = formatar(somaMed);

            // Atualiza Ranking Vendedores
            document.getElementById('sellers-list').innerHTML = state.sellers.map(s => {
                const prog = Math.min((s.sales / s.target) * 100, 100);
                return `
                    <div class="flex flex-col md:flex-row items-center gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <div class="w-32 font-[900] italic-force uppercase text-slate-700">${s.name}</div>
                        <div class="flex-grow w-full h-3 bg-slate-200 rounded-full overflow-hidden">
                            <div class="h-full bar-transition ${prog >= 100 ? 'bg-amber-400' : 'bg-emerald-500'}" style="width: ${prog}%"></div>
                        </div>
                        <div class="w-52">
                            <input type="text" oninput="mascaraVendedor(this, ${s.id})" class="input-field text-sm" value="${formatar(s.sales)}">
                        </div>
                    </div>`;
            }).join('');

            // Atualiza Inputs de Referência (Metas/Datas)
            const fields = ['ref2025', 'pior2026', 'melhor2026'];
            const labels = ['Março 2025', 'Pior 2026', 'Melhor 2026'];
            
            ['ecos', 'med'].forEach(emp => {
                document.getElementById(`${emp}-refs`).innerHTML = fields.map((f, idx) => `
                    <div class="bg-slate-50 p-2 rounded-xl text-center border border-slate-100">
                        <label class="text-[7px] font-black text-slate-400 uppercase block mb-1">${labels[idx]}</label>
                        <input type="text" oninput="mascaraFin(this, '${emp}', '${f}')" class="w-full text-center font-black text-[10px] bg-transparent outline-none text-slate-600" value="${formatar(state.fin[emp][f])}">
                    </div>
                `).join('');
            });

            // Atualiza Valor Atual da Ecos
            document.getElementById('ecos-atual').value = formatar(state.fin.ecos.atual);

            // Atualiza Cards de Comparação
            document.getElementById('res-ecos').innerHTML = 
                criarCardStatus("Março 2025", state.fin.ecos.ref2025, state.fin.ecos.atual, "📅") +
                criarCardStatus("Pior Mês 2026", state.fin.ecos.pior2026, state.fin.ecos.atual, "📉") +
                criarCardStatus("Melhor Mês 2026", state.fin.ecos.melhor2026, state.fin.ecos.atual, "🏆");

            document.getElementById('res-med').innerHTML = 
                criarCardStatus("Março 2025", state.fin.med.ref2025, somaMed, "📅") +
                criarCardStatus("Pior Mês 2026", state.fin.med.pior2026, somaMed, "📉") +
                criarCardStatus("Melhor Mês 2026", state.fin.med.melhor2026, somaMed, "🏆");
        }
    </script>
</body>
</html>
